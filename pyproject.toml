[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "vroom"
version = "0.1.0"
requires-python = ">=3.8"

# ──────────────────────────────────────────────────────────────────────────────
# Map top-level import names whose folder names are not valid Python identifiers.
# "Module1" → "module1", "Module2" → "module2", etc.
# ──────────────────────────────────────────────────────────────────────────────
[tool.setuptools.package-dir]
"module1"          = "Module1"


# Explicit list of every importable package (folder with __init__.py).
# Keep this in sync when you add new sub-packages.
[tool.setuptools]
packages = [
    # gstrain  →  import gstrain ...
    "gstrain",
    "gstrain.vroom_core",
    "gstrain.vroom_core.core",
    "gstrain.vroom_core.core.model",
    "gstrain.vroom_core.core.training",
    "gstrain.vroom_core.utilities",
    "gstrain.vroom_core.utilities.data_utils",
    "gstrain.vroom_core.utilities.gaussian_renderer",
    "gstrain.vroom_core.utilities.training",
    "gstrain.vroom_core.utilities.utils",

    # Module1  →  import module1 ...
    "module1",

    # object_isolation  →  import object_isolation ...
    "object_isolation",
    "object_isolation.core",
    "object_isolation.core.diffusion_priors",
    "object_isolation.debug",
]
