[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "vroom"
version = "0.1.0"
requires-python = ">=3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Map top-level import names whose folder names are not valid Python identifiers.
# "Module1" → "module1", "Module2" → "module2", etc.
# ──────────────────────────────────────────────────────────────────────────────
[tool.setuptools.package-dir]
"module1"          = "Module1"
"module2"          = "Module2"


# Explicit list of every importable package (folder with __init__.py).
# Keep this in sync when you add new sub-packages.
[tool.setuptools]
packages = [
    # gstrain  →  import gstrain ...
    "gstrain",
    "gstrain.gaussian_renderer",
    "gstrain.vroom_core",
    "gstrain.vroom_core.data",
    "gstrain.vroom_core.export",
    "gstrain.vroom_core.models",
    "gstrain.vroom_core.training",
    "gstrain.vroom_core.utils",
    "gstrain.vroom_core.viewer",

    # Module-1  →  import module1 ...
    "module1",

    # Module-2  →  import module2 ...
    "module2",
    "module2.utils",

    # object_isolation  →  import object_isolation ...
    "object_isolation",
    "object_isolation.core",
    "object_isolation.core.diffusion_priors",
    "object_isolation.debug",
]
